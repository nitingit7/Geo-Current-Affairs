<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World News Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* General Page Styling */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Layout: Map on the left, News on the right */
        #map-container { flex: 2; height: 100%; }
        #map { width: 100%; height: 100%; }
        
        #news-panel { 
            flex: 1; 
            height: 100%; 
            background: #f4f4f9; 
            overflow-y: auto; 
            padding: 20px; 
            box-sizing: border-box; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.2); 
            z-index: 1000; 
        }

        /* News Cards Styling */
        .news-item { 
            background: white; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }
        .news-item:hover { transform: translateY(-3px); }
        .news-item img { width: 100%; border-radius: 6px; margin-bottom: 10px; object-fit: cover;}
        .news-item h3 { margin: 0 0 10px 0; font-size: 1.2em; color: #111; }
        .news-item p { margin: 0 0 15px 0; font-size: 0.95em; color: #555; line-height: 1.4; }
        .news-item a { 
            text-decoration: none; 
            color: white; 
            background-color: #0056b3; 
            padding: 8px 12px; 
            border-radius: 4px; 
            font-size: 0.9em; 
            display: inline-block;
        }
        .news-item a:hover { background-color: #003d82; }
        
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #ddd; padding-bottom: 10px;}
        .loading { font-style: italic; color: #666; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
    </div>
    
    <div id="news-panel">
        <h2>🌍 World News Map</h2>
        <p><strong>Instructions:</strong> Click on any country on the map to fetch its latest news headlines.</p>
        <div id="news-content">
            <p style="color: #777;">Awaiting selection...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. INITIALIZE THE MAP
        // Center the map at coordinates [20, 0] with a zoom level of 2
        const map = L.map('map').setView([20, 0], 2);

        // Add the OpenStreetMap base tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            noWrap: true
        }).addTo(map);

        // ==========================================
        // GNEWS API KEY
        // ==========================================
        const API_KEY = 'd30822e794784070fc8da8c3d358162e'; 

        // 2. FETCH NEWS FUNCTION (Updated with Proxy)
        async function fetchNews(countryName) {
            const newsContent = document.getElementById('news-content');
            newsContent.innerHTML = `<div class="loading">Fetching latest news for <strong>${countryName}</strong>...<br><br>⏳</div>`;

            try {
                // The actual GNews API URL
                const targetUrl = `https://gnews.io/api/v4/search?q="${countryName}"&lang=en&max=10&apikey=${API_KEY}`;
                
                // Wrap the URL in a free public proxy to bypass CORS/Free-tier restrictions
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

                // Fetch through the proxy
                const response = await fetch(proxyUrl);
                const data = await response.json();

                // Handle API Errors
                if (data.errors) {
                    newsContent.innerHTML = `<p style="color:red;"><strong>API Error:</strong> ${data.errors[0]}</p>`;
                    return;
                }

                // Render Articles
                if (data.articles && data.articles.length > 0) {
                    let html = `<h2>Latest News: ${countryName}</h2>`;
                    data.articles.forEach(article => {
                        html += `
                            <div class="news-item">
                                ${article.image ? `<img src="${article.image}" alt="Article thumbnail">` : ''}
                                <h3>${article.title}</h3>
                                <p>${article.description}</p>
                                <a href="${article.url}" target="_blank">Read Full Article</a>
                            </div>
                        `;
                    });
                    newsContent.innerHTML = html;
                } else {
                    newsContent.innerHTML = `<h2>News: ${countryName}</h2><p>No recent news found for this region in English.</p>`;
                }
            } catch (error) {
                console.error(error); 
                newsContent.innerHTML = `<p style="color:red;">Failed to fetch news. Please check your internet connection.</p>`;
            }
        }

        // 3. LOAD INTERACTIVE COUNTRY BORDERS
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // Default style for countries
                    style: function (feature) {
                        return {
                            color: "#0056b3",
                            weight: 1,
                            fillColor: "#3388ff",
                            fillOpacity: 0.15
                        };
                    },
                    // Add interactivity to each country shape
                    onEachFeature: function (feature, layer) {
                        
                        // Hover effect: highlight country
                        layer.on('mouseover', function () {
                            this.setStyle({ fillOpacity: 0.4, color: '#002266', weight: 2 });
                        });
                        
                        // Mouse out effect: return to normal
                        layer.on('mouseout', function () {
                            this.setStyle({ fillOpacity: 0.15, color: '#0056b3', weight: 1 });
                        });

                        // Click event: Zoom in and fetch news
                        layer.on('click', function (e) {
                            // FIXED: Changed from feature.properties.ADMIN to feature.properties.name
                            const countryName = feature.properties.name; 
                            map.flyToBounds(e.target.getBounds(), { padding: [50, 50], duration: 1.5 }); // Smooth zoom
                            fetchNews(countryName); // Trigger the news search
                        });
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Error loading map data:', error));

    </script>
</body>
</html>
