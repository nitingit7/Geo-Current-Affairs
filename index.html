<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World News Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* CSS Variables for Industrial Dark Theme */
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --card-bg: #2a2a2d;
            --text-main: #f0f0f0;
            --text-muted: #9aa0a6;
            --accent-color: #00a8ff;
            --border-color: #333333;
        }

        /* General Page Styling */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            height: 100vh; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden; /* Prevent body scrolling, let panels scroll */
        }
        
        /* Layout: Default to side-by-side (Desktop) */
        #map-container { 
            flex: 6; /* 60% width on desktop */
            height: 100%; 
            position: relative;
        }
        #map { width: 100%; height: 100%; background-color: #0a0a0a; } /* Dark loading bg */
        
        #news-panel { 
            flex: 4; /* 40% width on desktop */
            height: 100%; 
            background: var(--panel-bg); 
            overflow-y: auto; 
            padding: 30px 25px; 
            box-sizing: border-box; 
            border-left: 1px solid var(--border-color);
            z-index: 1000; 
        }

        /* Custom Dark Scrollbar for Webkit */
        #news-panel::-webkit-scrollbar { width: 8px; }
        #news-panel::-webkit-scrollbar-track { background: var(--panel-bg); }
        #news-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        #news-panel::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Headers & Text */
        h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            border-bottom: 2px solid var(--border-color); 
            padding-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .instructions { color: var(--text-muted); font-size: 0.95em; margin-bottom: 25px; line-height: 1.5; }

        /* News Cards Styling */
        .news-item { 
            background: var(--card-bg); 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color);
            border-radius: 4px; /* Industrial sharp edges */
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .news-item:hover { 
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        .news-item img { 
            width: 100%; 
            border-radius: 2px; 
            margin-bottom: 15px; 
            object-fit: cover;
            border: 1px solid #222;
        }
        .news-item h3 { 
            margin: 0 0 12px 0; 
            font-size: 1.15em; 
            color: var(--text-main); 
            line-height: 1.4;
        }
        .news-item p { 
            margin: 0 0 20px 0; 
            font-size: 0.95em; 
            color: var(--text-muted); 
            line-height: 1.6; 
        }
        
        /* Industrial Button Style */
        .news-item a { 
            text-decoration: none; 
            color: var(--accent-color); 
            background-color: transparent; 
            padding: 8px 16px; 
            border: 1px solid var(--accent-color);
            border-radius: 2px; 
            font-size: 0.85em; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            transition: all 0.2s ease;
        }
        .news-item a:hover { 
            background-color: var(--accent-color); 
            color: #000; 
        }
        
        .loading { font-style: italic; color: var(--accent-color); text-align: center; margin-top: 50px; }

        /* ====================================================
           MOBILE RESPONSIVE FIX (Stack vertically on small screens)
           ==================================================== */
        @media (max-width: 800px) {
            body { 
                flex-direction: column; /* Stack map on top, news on bottom */
            }
            #map-container { 
                flex: none; 
                height: 40vh; /* Map takes up top 40% of phone screen */
                width: 100%; 
                border-bottom: 2px solid var(--accent-color);
            }
            #news-panel { 
                flex: none; 
                height: 60vh; /* News gets the bottom 60% */
                width: 100%; 
                border-left: none; 
            }
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
    </div>
    
    <div id="news-panel">
        <h2>🌐 Global Intelligence</h2>
        <p class="instructions">Select a region on the terminal map to interface with live local news broadcasts.</p>
        <div id="news-content">
            <p style="color: var(--text-muted); text-align: center; margin-top: 40px;">// AWAITING TARGET SELECTION //</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. INITIALIZE THE MAP
        const map = L.map('map').setView([20, 0], 2);

        // Dark Theme Map Tiles (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // ==========================================
        // GNEWS API KEY
        // ==========================================
        const API_KEY = 'd30822e794784070fc8da8c3d358162e'; 

        // 2. FETCH NEWS FUNCTION 
        async function fetchNews(countryName) {
            const newsContent = document.getElementById('news-content');
            newsContent.innerHTML = `<div class="loading">ESTABLISHING CONNECTION TO <strong>${countryName.toUpperCase()}</strong>...<br><br>⏳</div>`;

            try {
                const safeCountryName = encodeURIComponent(countryName);
                const targetUrl = `https://gnews.io/api/v4/search?q="${safeCountryName}"&lang=en&max=10&apikey=${API_KEY}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                const data = JSON.parse(proxyData.contents);

                if (data.errors) {
                    newsContent.innerHTML = `<p style="color:#ff4444;"><strong>SYSTEM ERROR:</strong> ${data.errors[0]}</p>`;
                    return;
                }

                if (data.articles && data.articles.length > 0) {
                    let html = `<h2>LATEST: ${countryName.toUpperCase()}</h2>`;
                    data.articles.forEach(article => {
                        html += `
                            <div class="news-item">
                                ${article.image ? `<img src="${article.image}" alt="Article thumbnail">` : ''}
                                <h3>${article.title}</h3>
                                <p>${article.description}</p>
                                <a href="${article.url}" target="_blank">Access Full Report</a>
                            </div>
                        `;
                    });
                    newsContent.innerHTML = html;
                } else {
                    newsContent.innerHTML = `<h2>${countryName.toUpperCase()}</h2><p style="color: var(--text-muted);">No current intelligence reports found for this sector in English.</p>`;
                }
            } catch (error) {
                console.error("Fetch error details:", error); 
                newsContent.innerHTML = `<p style="color:#ff4444;">CONNECTION FAILED. Please check your network link.</p>`;
            }
        }

        // 3. LOAD INTERACTIVE COUNTRY BORDERS (Dark Theme Style)
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // Industrial style for unselected countries
                    style: function (feature) {
                        return {
                            color: "#333333", // Subtle dark border
                            weight: 1,
                            fillColor: "#1a1a1a",
                            fillOpacity: 0.4
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        
                        // Hover effect: Bright blue outline
                        layer.on('mouseover', function () {
                            this.setStyle({ 
                                fillOpacity: 0.6, 
                                color: '#00a8ff', 
                                weight: 2,
                                fillColor: '#004466'
                            });
                        });
                        
                        // Mouse out: Return to dark
                        layer.on('mouseout', function () {
                            this.setStyle({ 
                                fillOpacity: 0.4, 
                                color: '#333333', 
                                weight: 1,
                                fillColor: '#1a1a1a'
                            });
                        });

                        // Click event
                        layer.on('click', function (e) {
                            const countryName = feature.properties.name; 
                            map.flyToBounds(e.target.getBounds(), { padding: [20, 20], duration: 1.2 }); 
                            fetchNews(countryName); 
                        });
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Error loading map data:', error));

    </script>
</body>
</html>
